server:
  port: 8080

spring:
  application:
    name: permission-platform
  
  # MySQL配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.177.101:3306/permission_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456
  
  # Redis配置（可选）
  redis:
    host: 192.168.177.101
    port: 6379
    password:
    database: 0

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.permission.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置
jwt:
  secret: permission-platform-secret-key-2024
  expiration: 86400000  # 24小时

# 验证码配置
captcha:
  expiration: 300000  # 5分钟

# 日志配置
logging:
  level:
    com.permission: debug
    org.springframework: info
